name: Notify Landing Page Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to include in the dispatch payload"
        required: false
        type: string

permissions:
  contents: read

jobs:
  notify-landing-page:
    runs-on: ubuntu-latest
    if: github.repository == 'kenryu42/cc-safety-net'
    steps:
      - name: Dispatch landing page release sync
        env:
          LANDING_PAGE_DISPATCH_TOKEN: ${{ secrets.LANDING_PAGE_DISPATCH_TOKEN }}
          RELEASE_HTML_URL: ${{ github.event.release.html_url }}
          RELEASE_ID: ${{ github.event.release.id }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || 'manual-test' }}
        run: |
          jq -nc \
            --arg tag "$RELEASE_TAG" \
            --arg source_repository "$GITHUB_REPOSITORY" \
            --arg release_html_url "$RELEASE_HTML_URL" \
            --arg release_id "$RELEASE_ID" \
            '{
              event_type: "cc-safety-net-release-published",
              client_payload: {
                tag: $tag,
                source_repository: $source_repository,
                release_html_url: $release_html_url,
                release_id: $release_id
              }
            }' \
            | curl -fsS -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $LANDING_PAGE_DISPATCH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/kenryu42/cc-safety-net-landing-page/dispatches \
              --data-binary @-
